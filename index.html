<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book Library</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <h1>Book Library</h1>
  </header>

  <main>
    <section>
      <h2>Stats</h2>
      <ul>
        <li>Total books: <strong id="stat-total">0</strong></li>
        <li>Books read: <strong id="stat-read">0</strong></li>
        <li>Books unread: <strong id="stat-unread">0</strong></li>
        <li>Completion rate: <strong id="stat-percent">0%</strong></li>
      </ul>
    </section>
    
    <section class="library-card">
      <div class="section-header">
        <h2>Library</h2>
        <button id="add-book-btn" class="primary-btn">Add Book</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Genre</th>
            <th>Pages</th>
            <th>Year</th>
            <th>Read</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="book-table-body"></tbody>
      </table>
    </section>
  </main>

  <div id="modal-overlay" class="modal hidden">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="form-title">
      <div class="modal-header">
        <h2 id="form-title">Add Book</h2>
        <button type="button" id="close-modal" class="icon-btn" aria-label="Close modal">×</button>
      </div>

      <form id="book-form">
        <div class="form-row">
          <label for="title">Title</label>
          <input type="text" id="title" required />
        </div>

        <div class="form-row">
          <label for="author">Author</label>
          <input type="text" id="author" required />
        </div>

        <div class="form-row">
          <label for="genre">Genre</label>
          <input type="text" id="genre" required />
        </div>

        <div class="form-row half">
          <div>
            <label for="pages">Pages</label>
            <input type="number" id="pages" min="1" required />
          </div>
          <div>
            <label for="year">Year</label>
            <input type="number" id="year" min="1450" max="2100" required />
          </div>
        </div>

        <div class="form-row inline">
          <label>
            <input type="checkbox" id="read" />
            Read
          </label>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="ghost-btn">Cancel</button>
          <button type="submit" class="primary-btn">Save Book</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
