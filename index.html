<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book Library</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <h1>Book Library</h1>
  </header>

  <main>
    <section>
      <h2>Stats</h2>
      <ul>
        <li>Total books: <strong id="stat-total">0</strong></li>
        <li>Books read: <strong id="stat-read">0</strong></li>
        <li>Books unread: <strong id="stat-unread">0</strong></li>
        <li>Completion rate: <strong id="stat-percent">0%</strong></li>
      </ul>
    </section>
    
    <section class="library-card">
      <div class="section-header">
        <h2>Library</h2>
        <button id="add-book-btn" class="primary-btn">Add Book</button>
      </div>
      <div class="library-controls">
        <div class="search-control">
          <label for="search-title">Search title</label>
          <input type="search" id="search-title" placeholder="Type a title..." />
        </div>
        <div class="sort-control">
          <span>Sort by year</span>
          <button id="sort-year-btn" class="ghost-btn" type="button" aria-pressed="false">Newest to Oldest</button>
        </div>
        <div class="page-size-control">
          <label for="page-size">Page size</label>
          <select id="page-size">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Cover</th>
              <th>Title</th>
              <th>Author</th>
              <th>Genre</th>
              <th>Pages</th>
              <th>Year</th>
              <th>Read</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="book-table-body"></tbody>
        </table>
      </div>
      <div class="pagination-controls">
        <button id="prev-page-btn" class="ghost-btn" type="button">Previous</button>
        <span id="page-indicator">Page 1 of 1</span>
        <button id="next-page-btn" class="ghost-btn" type="button">Next</button>
      </div>
    </section>
  </main>

  <div id="modal-overlay" class="modal hidden">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="form-title">
      <div class="modal-header">
        <h2 id="form-title">Add Book</h2>
        <button type="button" id="close-modal" class="icon-btn" aria-label="Close modal">×</button>
      </div>

      <form id="book-form">
        <div class="form-row">
          <label for="title">Title</label>
          <input type="text" id="title" required />
        </div>

        <div class="form-row">
          <label for="author">Author</label>
          <input type="text" id="author" required />
        </div>

        <div class="form-row">
          <label for="genre">Genre</label>
          <input type="text" id="genre" required />
        </div>

        <div class="form-row">
          <label for="image-url">Image URL</label>
          <input type="url" id="image-url" required />
        </div>

        <div class="form-row half">
          <div>
            <label for="pages">Pages</label>
            <input type="number" id="pages" min="1" required />
          </div>
          <div>
            <label for="year">Year</label>
            <input type="number" id="year" min="1450" max="2100" required />
          </div>
        </div>

        <div class="form-row inline">
          <label>
            <input type="checkbox" id="read" />
            Read
          </label>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="ghost-btn">Cancel</button>
          <button type="submit" class="primary-btn">Save Book</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>

</body>
</html>
